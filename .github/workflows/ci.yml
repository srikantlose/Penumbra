name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: penumbra
          POSTGRES_PASSWORD: penumbra
          POSTGRES_DB: penumbra
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # minio has no official GitHub Actions "services" support for its
      # required `server /data` command (the services: block can't override
      # a container's CMD), so it's started as a plain background container
      # instead -- same image/credentials as infra/docker-compose.yml.
      - name: Start minio
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && exit 0
            sleep 1
          done
          echo "minio did not become healthy in time" >&2
          exit 1

      - name: Run database migrations
        run: pnpm run db:migrate
        env:
          DATABASE_URL: postgres://penumbra:penumbra@localhost/penumbra

      - name: Test (TypeScript)
        run: pnpm test
        env:
          DATABASE_URL: postgres://penumbra:penumbra@localhost/penumbra
          REDIS_URL: redis://localhost:6379
          MINIO_HOST: localhost
          MINIO_PORT: '9000'
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin

      - name: Test (Rust)
        run: cargo test --workspace

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets
